name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest] # Add windows-latest, macos-latest if cross-platform testing is needed
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'
    - run: npm install
    - run: npm run compile
    - run: npm run lint
    - name: Run Tests
      run: xvfb-run -a npm test
      if: runner.os == 'Linux'
    - name: Run Tests (non-Linux)
      run: npm test
      if: runner.os != 'Linux'
