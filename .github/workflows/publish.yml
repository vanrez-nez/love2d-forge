name: Publish Extension

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
    - run: npm install
    - run: npm run compile
    - run: npm run lint
    - name: Run Tests
      run: xvfb-run -a npm test
    - name: Sync and Publish
      run: npm run publish:all -- --pat ${{ secrets.VSCE_PAT }} --token ${{ secrets.OVSX_TOKEN }}
